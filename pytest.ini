[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    fault: fault injection test
    slow: slow test (deselect with '-m "not slow"')
    unit: unit test
timeout = 30
log_cli = false
log_file = reports/pytest.log
addopts = -v --tb=short --strict-markers
